<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masters 2026 — Pool</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f5f4;
      --bg-tertiary: #fafaf9;
      --text: #1c1917;
      --text-secondary: #78716c;
      --text-tertiary: #a8a29e;
      --border: rgba(0,0,0,0.10);
      --border-mid: rgba(0,0,0,0.18);
      --border-strong: rgba(0,0,0,0.30);
      --green-bg: #dcfce7;
      --radius: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1917;
        --bg-secondary: #292524;
        --bg-tertiary: #211f1e;
        --text: #fafaf9;
        --text-secondary: #a8a29e;
        --text-tertiary: #78716c;
        --border: rgba(255,255,255,0.10);
        --border-mid: rgba(255,255,255,0.18);
        --border-strong: rgba(255,255,255,0.28);
        --green-bg: #14532d55;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-tertiary);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Top bar ── */
    .topbar {
      background: #1a5c2a;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-flag {
      width: 32px; height: 32px; border-radius: 50%;
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .topbar h1 { font-size: 16px; font-weight: 600; color: #fff; letter-spacing: 0.01em; }
    .topbar p { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 1px; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .live-badge {
      font-size: 11px; font-weight: 600; padding: 3px 9px;
      border-radius: 99px; background: #ef4444; color: #fff;
      display: flex; align-items: center; gap: 5px;
    }
    .live-badge::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%; background: #fff;
    }
    .refresh-btn {
      font-size: 12px; padding: 5px 12px; border-radius: var(--radius);
      background: rgba(255,255,255,0.15); color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      cursor: pointer; transition: background .15s;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.25); }
    .last-updated { font-size: 11px; color: rgba(255,255,255,0.55); }

    /* ── Tabs ── */
    .tab-bar {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      display: flex; gap: 0;
      overflow-x: auto;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      padding: 12px 16px; font-size: 13px; font-weight: 500;
      color: var(--text-secondary); background: none; border: none;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      cursor: pointer; white-space: nowrap; transition: color .15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--text); border-bottom-color: #1a5c2a; }

    /* ── Main content ── */
    .main { max-width: 960px; margin: 0 auto; padding: 20px 16px 48px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Scorecard ── */
    .section { margin-bottom: 28px; }
    .sec-hdr {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 8px; flex-wrap: wrap;
    }
    .pname {
      font-size: 13px; font-weight: 600; padding: 3px 12px;
      border-radius: 99px; color: #fff;
    }
    .pool-pos { font-size: 12px; color: var(--text-secondary); }
    .pool-score { font-size: 14px; font-weight: 600; color: var(--text); }

    .sc-wrap { overflow-x: auto; border-radius: var(--radius-lg); border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 12px; background: var(--bg); }
    table:first-child { border-radius: var(--radius-lg) var(--radius-lg) 0 0; overflow: hidden; }

    thead tr { background: var(--bg-secondary); }
    th {
      padding: 7px 10px; text-align: center;
      font-size: 10px; font-weight: 600; color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
      text-transform: uppercase; letter-spacing: .05em; white-space: nowrap;
    }
    th.left { text-align: left; }
    td {
      padding: 6px 10px; border-bottom: 1px solid var(--border);
      text-align: center; vertical-align: middle; color: var(--text);
    }
    td.left { text-align: left; }
    tr:last-child td { border-bottom: none; }

    tr.tier-start td { border-top: 2px solid var(--border-strong); }
    td.best-score { background: var(--green-bg); }

    tr.cut-row td { opacity: .4; }
    tr.cut-row .pn { text-decoration: line-through; }

    tr.summary-row td {
      border-top: 2px solid var(--border-strong);
      background: var(--bg-secondary);
      font-weight: 600; color: var(--text);
    }
    tr.summary-row td.left { font-size: 11px; color: var(--text-secondary); }

    .pn { font-size: 12px; color: var(--text); }
    .tier-badge { font-size: 9px; color: var(--text-tertiary); margin-left: 5px; }
    .pos-cell { font-size: 11px; color: var(--text-secondary); }

    .rcell { display: inline-flex; align-items: baseline; gap: 8px; }
    .rscore { font-size: 12px; font-weight: 500; color: var(--text); }
    .rthru { font-size: 9px; color: var(--text-secondary); white-space: nowrap; }
    .rthru.live { color: #dc2626; }
    .live-dot {
      display: inline-block; width: 5px; height: 5px;
      border-radius: 50%; background: #dc2626;
      margin-right: 2px; vertical-align: middle;
    }

    /* ── Standings cards ── */
    .standings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 12px; margin-bottom: 24px;
    }
    .pc {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 14px 16px;
    }
    .pc.lead { border-width: 2px; }
    .pc-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .pc-name { font-size: 13px; font-weight: 600; }
    .pc-rank { font-size: 12px; color: var(--text-secondary); }
    .pc-score { font-size: 28px; font-weight: 700; color: var(--text); line-height: 1; }
    .pc-sub { font-size: 11px; color: var(--text-secondary); margin-top: 3px; margin-bottom: 10px; }
    .pc-rows { display: flex; flex-direction: column; gap: 3px; border-top: 1px solid var(--border); padding-top: 8px; margin-top: 4px; }
    .pc-row { display: flex; justify-content: space-between; font-size: 11px; padding: 2px 4px; border-radius: 4px; background: var(--bg-secondary); }
    .pc-row .gl { color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; }
    .pc-row .gr { font-weight: 600; }

    /* ── Leaderboard ── */
    .lb-note { font-size: 11px; color: var(--text-secondary); margin-bottom: 10px; }
    .lb-note span { background: #fef9c3; padding: 1px 5px; border-radius: 3px; }
    tr.inpool td { background: #fef9c3; }
    @media (prefers-color-scheme: dark) {
      tr.inpool td { background: #422006; }
      .lb-note span { background: #422006; }
    }
    tr.inpool.cut-row td { opacity: .5; }

    /* ── Loading ── */
    .loading { padding: 40px; text-align: center; font-size: 13px; color: var(--text-secondary); }

    @media (max-width: 480px) {
      .main { padding: 12px 10px 40px; }
      .topbar { padding: 10px 14px; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-flag">⛳</div>
    <div>
      <h1>Masters 2026 — Family Pool</h1>
      <p>8 tiers · 2 picks each · best score counts</p>
    </div>
  </div>
  <div class="topbar-right">
    <span class="live-badge" id="live-badge">Live</span>
    <button class="refresh-btn" onclick="load()">↻ Refresh</button>
    <span class="last-updated" id="lu"></span>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="sw('standings',this)">Standings</button>
  <button class="tab-btn" onclick="sw('scorecard',this)">Scorecard</button>
  <button class="tab-btn" onclick="sw('leaderboard',this)">Leaderboard</button>
</div>

<div class="main">
  <div id="tab-standings" class="tab-panel active"><div class="loading">Loading…</div></div>
  <div id="tab-scorecard" class="tab-panel"><div class="loading">Loading…</div></div>
  <div id="tab-leaderboard" class="tab-panel"><div class="loading">Loading…</div></div>
</div>

<script>
// ── CONFIG — edit picks and names here ──────────────────────────────────────
const COLORS = {
  Conner: '#1d9e75', Nick: '#378add', Zach: '#d85a30', Jaden: '#9333ea', Dad: '#b45309'
};
const NAMES = ['Conner', 'Nick', 'Zach', 'Jaden', 'Dad'];

const TIERS = [
  { name: 'Group 1', players: ['Scheffler','Rahm','DeChambeau','McIlroy','Åberg'] },
  { name: 'Group 2', players: ['Schauffele','Fleetwood','Young','Fitzpatrick','Matsuyama'] },
  { name: 'Group 3', players: ['Morikawa','Min Woo Lee','Rose','MacIntyre','Koepka'] },
  { name: 'Group 4', players: ['Spieth','Reed','Gotterup','Hovland','Henley'] },
  { name: 'Group 5', players: ['Si Woo Kim','Thomas','Bhatia','Cantlay','Scott'] },
  { name: 'Group 6', players: ['Knapp','Lowry','Day','Spaun','Burns'] },
  { name: 'Group 7', players: ['N. Hojgaard','Straka','McNealy','Hatton','Bridgeman'] },
  { name: 'Group 8', players: ['Conners','Kityama','English','Griffin','Smith'] },
];

// [tier0_pick_indices, tier1_pick_indices, ...] — 0-based index into each tier's players array
const PICKS = {
  // T1:Scheffler/Rahm/DeChambeau/McIlroy/Åberg
  // T2:Schauffele/Fleetwood/Young/Fitzpatrick/Matsuyama
  // T3:Morikawa/Min Woo Lee/Rose/MacIntyre/Koepka
  // T4:Spieth/Reed/Gotterup/Hovland/Henley
  // T5:Si Woo Kim/Thomas/Bhatia/Cantlay/Scott
  // T6:Knapp/Lowry/Day/Spaun/Burns
  // T7:N. Hojgaard/Straka/McNealy/Hatton/Bridgeman
  // T8:Conners/Kityama/English/Griffin/Smith
  Conner: [[0,4],[0,1],[0,3],[2,4],[0,2],[0,4],[0,2],[0,2]],
  Nick:   [[0,2],[0,1],[0,4],[0,3],[2,3],[1,3],[1,3],[0,2]],
  Zach:   [[0,3],[1,3],[0,1],[0,3],[0,2],[1,2],[0,4],[0,4]],
  Jaden:  [[0,2],[2,3],[2,3],[1,3],[2,4],[1,2],[3,4],[0,3]],
  Dad:    [[0,4],[0,4],[0,2],[0,1],[0,2],[3,4],[0,1],[0,2]],
};

const FULLNAMES = {
  // Tier 1 — verified ESPN display names
  'Scheffler':   'Scottie Scheffler',
  'Rahm':        'Jon Rahm',
  'DeChambeau':  'Bryson DeChambeau',
  'McIlroy':     'Rory McIlroy',
  'Åberg':       'Ludvig Åberg',
  // Tier 2
  'Schauffele':  'Xander Schauffele',
  'Fleetwood':   'Tommy Fleetwood',
  'Young':       'Cameron Young',
  'Fitzpatrick': 'Matt Fitzpatrick',   // ESPN uses "Matt" not "Matthew"
  'Matsuyama':   'Hideki Matsuyama',
  // Tier 3
  'Morikawa':    'Collin Morikawa',
  'Min Woo Lee': 'Min Woo Lee',
  'Rose':        'Justin Rose',
  'MacIntyre':   'Robert MacIntyre',
  'Koepka':      'Brooks Koepka',
  // Tier 4
  'Spieth':      'Jordan Spieth',
  'Reed':        'Patrick Reed',
  'Gotterup':    'Chris Gotterup',
  'Hovland':     'Viktor Hovland',
  'Henley':      'Russell Henley',
  // Tier 5
  'Si Woo Kim':  'Si Woo Kim',
  'Thomas':      'Justin Thomas',
  'Bhatia':      'Akshay Bhatia',
  'Cantlay':     'Patrick Cantlay',
  'Scott':       'Adam Scott',
  // Tier 6
  'Knapp':       'Jake Knapp',
  'Lowry':       'Shane Lowry',
  'Day':         'Jason Day',
  'Spaun':       'J.J. Spaun',
  'Burns':       'Sam Burns',
  // Tier 7
  'N. Hojgaard': 'Nicolai Hojgaard',  // norm() strips ø -> o, so this matches ESPN's "Nicolai Højgaard"
  'Straka':      'Sepp Straka',
  'McNealy':     'Maverick McNealy',
  'Hatton':      'Tyrrell Hatton',
  'Bridgeman':   'Jacob Bridgeman',
  // Tier 8
  'Conners':     'Corey Conners',
  'Kityama':     'Kurt Kitayama',
  'English':     'Harris English',
  'Griffin':     'Lanto Griffin',
  'Smith':       'Cameron Smith',
};
// ── END CONFIG ──────────────────────────────────────────────────────────────

let playerMap = {};

function norm(s) {
  return (s||'').toLowerCase()
    .replace(/[åäæ]/g,'a').replace(/[øö]/g,'o').replace(/[ü]/g,'u').replace(/[éè]/g,'e')
    .replace(/[^a-z ]/g,'').trim();
}

function lookup(sn) {
  const full = FULLNAMES[sn] || sn;
  const nf = norm(full);
  // Exact full name match
  if (playerMap[nf]) return playerMap[nf];
  // Last name match
  const last = nf.split(' ').pop();
  if (last.length > 3) {
    const k = Object.keys(playerMap).find(k => k.endsWith(' ' + last) || k === last);
    if (k) return playerMap[k];
  }
  // First name initial match e.g. "n hojgaard" -> "nicolai hojgaard"
  const parts = nf.split(' ');
  if (parts.length >= 2 && parts[0].length === 1) {
    const initial = parts[0];
    const lastName = parts.slice(1).join(' ');
    const k = Object.keys(playerMap).find(k => {
      const kp = k.split(' ');
      return kp.length >= 2 && kp[0].startsWith(initial) && kp.slice(1).join(' ') === lastName;
    });
    if (k) return playerMap[k];
  }
  return null;
}

function fmt(s) {
  if (s === null || s === undefined || isNaN(s)) return '-';
  if (s === 0) return 'E';
  return s < 0 ? '' + s : '+' + s;
}

// Compute true total: sum of completed round to-pars + live topar for active round
// Get to-par for a single completed round (stroke score -> to-par)
function roundTopar(strokeScore) {
  return (strokeScore !== null && strokeScore >= 65 && strokeScore <= 85) ? strokeScore - 72 : null;
}

// Get incremental to-par for the current active round only
function activeRoundTopar(r) {
  if (!r || r.topar === null || r.topar === undefined) return null;
  let completedSum = 0;
  for (let k = 0; k < 4; k++) {
    if (r.period === (k + 1)) break;
    const rtp = roundTopar((r.rounds || [])[k]);
    if (rtp !== null) completedSum += rtp;
  }
  return r.topar - completedSum;
}

// True total: sum of all completed round to-pars + active round's incremental to-par
function computeTotal(r) {
  if (!r) return null;
  const rounds = r.rounds || [null, null, null, null];
  let sum = 0;
  let hasAny = false;
  for (let k = 0; k < 4; k++) {
    const rtp = roundTopar(rounds[k]);
    if (rtp !== null) {
      sum += rtp;
      hasAny = true;
    } else if (!r.cut && r.active && r.period === (k + 1) && r.topar !== null && r.topar !== undefined) {
      sum += activeRoundTopar(r);
      hasAny = true;
      break;
    }
  }
  if (!hasAny) return r.topar !== undefined ? r.topar : null;
  return sum;
}

// fmt with fallback label for truly unknown values
function fmtOrDash(s) {
  return (s === null || s === undefined || isNaN(s)) ? '-' : fmt(s);
}

function assignPositions(entries) {
  const sorted = [...entries].sort((a, b) => {
    if (a.cut && !b.cut) return 1;
    if (!a.cut && b.cut) return -1;
    return (computeTotal(a) ?? 99) - (computeTotal(b) ?? 99);
  });
  const posMap = {};
  let i = 0;
  while (i < sorted.length) {
    let j = i;
    while (j < sorted.length && sorted[j].topar === sorted[i].topar && sorted[j].cut === sorted[i].cut) j++;
    const label = sorted[i].cut ? 'CUT' : (j - i > 1 ? 'T' + (i + 1) : '' + (i + 1));
    for (let k = i; k < j; k++) posMap[sorted[k].key] = label;
    i = j;
  }
  return posMap;
}

function roundCell(completedStroke, activeTopar, thru, isActive, isFuture, isBest, teeTime) {
  const bg = isBest ? ' best-score' : '';
  if (isFuture) return `<td class="${bg}" style="color:var(--text-tertiary);">-</td>`;
  let scoreStr = '', thruHtml = '';
  if (completedStroke !== null && completedStroke !== undefined) {
    scoreStr = fmt(completedStroke - 72);
    thruHtml = `<span class="rthru">F·${completedStroke}</span>`;
  } else if (isActive) {
    scoreStr = fmt(activeTopar);
    const tv = (thru && thru !== '-' && thru !== 'F') ? thru : '';
    if (tv) {
      thruHtml = `<span class="rthru live"><span class="live-dot"></span>${tv}</span>`;
    } else if (teeTime) {
      thruHtml = `<span class="rthru">${teeTime}</span>`;
    } else {
      thruHtml = `<span class="rthru live"><span class="live-dot"></span>Live</span>`;
    }
  } else {
    return `<td class="${bg}" style="color:var(--text-tertiary);">-</td>`;
  }
  return `<td class="${bg}"><div class="rcell"><span class="rscore">${scoreStr}</span>${thruHtml}</div></td>`;
}

// Format a tee time string (ISO or ESPN format) to a short local time like "1:42 PM"
function formatTeeTime(raw) {
  try {
    const d = new Date(raw);
    if (isNaN(d.getTime())) return raw;
    return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZone: 'America/Chicago' })
            .replace(':00 ', ' ') + ' CDT';
  } catch(e) { return ''; }
}

// Parse to-par robustly — tries every known ESPN field path
function parseTopar(c) {
  // Try statistics array first — ESPN puts live scoreToPar here
  const stats = c.statistics || c.athlete?.statistics || [];
  for (const s of stats) {
    const val = s.displayValue ?? s.value;
    if (val === null || val === undefined || val === '') continue;
    const sv = String(val).trim();
    if (sv === 'E' || sv === 'Even') return 0;
    const n = parseInt(sv);
    if (!isNaN(n) && n >= -30 && n <= 30) return n;
  }
  // score.value is sometimes the raw to-par integer
  if (c.score?.value !== undefined && c.score.value !== null) {
    const v = parseFloat(c.score.value);
    if (!isNaN(v) && v >= -30 && v <= 30 && v !== 0) return Math.round(v);
  }
  // score.displayValue — but only if it's NOT "E" when player is active (ESPN uses E as placeholder)
  // We still need it for truly even players, so we accept it but deprioritise
  const candidates = [
    c.score?.toPar,
    c.toPar,
    c.total,
  ];
  for (const v of candidates) {
    if (v === null || v === undefined || v === '') continue;
    const s = String(v).trim();
    if (s === 'E' || s === 'Even') return 0;
    const n = parseInt(s);
    if (!isNaN(n) && n >= -30 && n <= 30) return n;
  }
  // Last resort: displayValue (may be stale "E" mid-round)
  const dv = c.score?.displayValue;
  if (dv !== null && dv !== undefined && dv !== '') {
    const s = String(dv).trim();
    if (s === 'E' || s === 'Even') return 0;
    const n = parseInt(s);
    if (!isNaN(n) && n >= -30 && n <= 30) return n;
  }
  return null;
}

// Log raw competitor data once for debugging (first call only)
let _debugLogged = false;
function debugLog(competitors) {
  if (_debugLogged || !competitors.length) return;
  _debugLogged = true;
  const c = competitors[0];
  console.log('[Masters Pool] Sample competitor fields:', {
    name: c.athlete?.displayName,
    score: c.score,
    toPar: c.toPar,
    total: c.total,
    statistics: c.statistics,
    status: c.status,
    linescores: c.linescores,
  });
}

async function load() {
  document.getElementById('lu').textContent = 'Fetching…';
  try {
    const urls = [
      'https://site.web.api.espn.com/apis/site/v2/sports/golf/leaderboard?league=pga',
      'https://site.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard',
    ];
    let competitors = [];
    for (const url of urls) {
      try {
        const r = await fetch(url);
        const d = await r.json();
        const m = (d.events || []).find(e => (e.name || '').toLowerCase().includes('master'));
        if (m) {
          const comps = m.competitions?.[0]?.competitors || [];
          if (comps.length) { competitors = comps; break; }
        }
      } catch(e) {}
    }
    if (competitors.length) {
      debugLog(competitors);
      playerMap = {};
      const entries = [];
      competitors.forEach(c => {
        const name = c.athlete?.displayName || c.athlete?.shortName || '';
        const key = norm(name);
        // Round scores: only accept realistic 18-hole totals (60-90 strokes)
        const ls = c.linescores || [];
        const rounds = ls.map(l => {
          const v = parseInt(l.value);
          // Only accept realistic 18-hole Augusta scores (65-85); excludes par-3 contest scores
          return (!isNaN(v) && v >= 65 && v <= 85) ? v : null;
        });
        while (rounds.length < 4) rounds.push(null);
        // Use robust to-par parser
        const topar = parseTopar(c);
        // Thru: treat "0" as not started
        const thruRaw = c.status?.thru ?? c.status?.displayValue ?? '-';
        const thru = (thruRaw === '0' || thruRaw === 0) ? '-' : String(thruRaw);
        const typeDesc = (c.status?.type?.description || c.status?.type?.name || '').toLowerCase();
        const cut = typeDesc.includes('cut') || typeDesc.includes('wd') || typeDesc.includes('dq');
        const finished = typeDesc.includes('final') || thru === 'F' || thru === 'Final';
        const active = !finished && !cut;
        const period = c.status?.period || 1;
        const apiPos = c.status?.position?.displayName || c.status?.position?.abbreviation || '';
        // Tee time for players who haven't started yet
        const teeTimeRaw = c.status?.teeTime || c.teeTime || c.startTime || '';
        const teeTime = teeTimeRaw ? formatTeeTime(teeTimeRaw) : '';
        playerMap[key] = { name, topar, thru, rounds, cut, active, finished, period, apiPos, teeTime };
        entries.push({ key, topar: topar ?? 99, cut });
      });
      const posMap = assignPositions(entries);
      Object.keys(playerMap).forEach(k => {
        playerMap[k].pos = playerMap[k].apiPos || posMap[k] || '-';
      });
      document.getElementById('lu').textContent = 'Updated ' + new Date().toLocaleTimeString();
      document.getElementById('live-badge').style.display = '';
    } else {
      document.getElementById('lu').textContent = 'Using demo data';
      document.getElementById('live-badge').style.display = 'none';
      loadDemo();
    }
  } catch(e) {
    document.getElementById('lu').textContent = 'Demo data';
    loadDemo();
  }
  renderAll();
}

function computeAllTotals() {
  return NAMES.map(pName => {
    const tierBests = TIERS.map((tier, ti) => {
      const rows = PICKS[pName][ti].map(idx => {
        const sn = tier.players[idx];
        const d = lookup(sn) || { name: sn, topar: null, thru: '-', rounds: [null,null,null,null], cut: false, active: false, finished: false, period: 1, pos: '-' };
        const rounds = (d.rounds || []).slice(0, 4);
        while (rounds.length < 4) rounds.push(null);
        return { ...d, rounds };
      });
      rows.sort((a, b) => { if (a.cut && !b.cut) return 1; if (!a.cut && b.cut) return -1; return (computeTotal(a) ?? 99) - (computeTotal(b) ?? 99); });
      return rows[0];
    });
    // Only include tiers where we have actual data; null means not yet known
    const currentTotal = tierBests.reduce((s, b) => s + (computeTotal(b) ?? 0), 0);
    const roundTotals = [currentTotal, null, null, null];
    for (let ri = 1; ri < 4; ri++) {
      let sum = 0, complete = true;
      tierBests.forEach(best => {
        // All rounds 0..ri must have valid stroke scores
        for (let k = 0; k <= ri; k++) {
          const rv = best.rounds[k];
          if (rv === null || rv < 65 || rv > 85) { complete = false; return; }
          sum += rv - 72;
        }
      });
      roundTotals[ri] = complete ? sum : null;
    }
    return { name: pName, currentTotal, roundTotals };
  });
}

const ORDINALS = ['1st','2nd','3rd','4th','5th'];

function renderAll() {
  renderStandings();
  renderScorecard();
  renderLeaderboard();
}

function renderStandings() {
  const allScores = computeAllTotals();
  const ranked = [...allScores].sort((a, b) => a.currentTotal - b.currentTotal);
  const poolPos = {};
  ranked.forEach((p, i) => poolPos[p.name] = ORDINALS[i]);

  let html = '<div class="standings-grid">';
  ranked.forEach((p, rank) => {
    const color = COLORS[p.name];
    const tierBests = TIERS.map((tier, ti) => {
      const rows = PICKS[p.name][ti].map(idx => {
        const sn = tier.players[idx];
        const d = lookup(sn) || { topar: null, cut: false };
        return { sn, ...d };
      });
      rows.sort((a, b) => { if (a.cut && !b.cut) return 1; if (!a.cut && b.cut) return -1; return (computeTotal(a) ?? 99) - (computeTotal(b) ?? 99); });
      return { tier: tier.name, best: rows[0] };
    });
    html += `<div class="pc${rank === 0 ? ' lead' : ''}" style="${rank === 0 ? 'border-color:' + color : ''}">
      <div class="pc-top">
        <span class="pc-name" style="color:${color}">${p.name}</span>
        <span class="pc-rank">${ORDINALS[rank]}</span>
      </div>
      <div class="pc-score">${fmt(p.currentTotal)}</div>
      <div class="pc-sub">pool total</div>
      <div class="pc-rows">`;
    tierBests.forEach(g => {
      html += `<div class="pc-row">
        <span class="gl">${g.tier}: ${g.best?.sn || '-'}</span>
        <span class="gr">${fmt(g.best?.topar)}</span>
      </div>`;
    });
    html += `</div></div>`;
  });
  html += '</div>';
  document.getElementById('tab-standings').innerHTML = html;
}

function renderScorecard() {
  const allScores = computeAllTotals();
  const ranked = [...allScores].sort((a, b) => a.currentTotal - b.currentTotal);
  const poolPos = {};
  ranked.forEach((p, i) => poolPos[p.name] = ORDINALS[i]);

  let html = '';
  NAMES.forEach(pName => {
    const color = COLORS[pName];
    const { currentTotal, roundTotals } = allScores.find(s => s.name === pName);

    const tierData = TIERS.map((tier, ti) => {
      const rows = PICKS[pName][ti].map(idx => {
        const sn = tier.players[idx];
        const d = lookup(sn) || { topar: null, thru: '-', rounds: [null,null,null,null], cut: false, active: false, finished: false, period: 1, pos: '-' };
        const rounds = (d.rounds || []).slice(0, 4);
        while (rounds.length < 4) rounds.push(null);
        return { sn, tier: tier.name, ...d, rounds };
      });
      rows.sort((a, b) => { if (a.cut && !b.cut) return 1; if (!a.cut && b.cut) return -1; return (computeTotal(a) ?? 99) - (computeTotal(b) ?? 99); });
      rows[0].isBest = true;
      return rows;
    });

    html += `<div class="section">
      <div class="sec-hdr">
        <span class="pname" style="background:${color}">${pName}</span>
        <span class="pool-pos">${poolPos[pName]}</span>
        <span class="pool-score">${fmt(currentTotal)}</span>
      </div>
      <div class="sc-wrap"><table>
        <thead><tr>
          <th class="left">Player</th><th>Pos</th>
          <th>R1</th><th>R2</th><th>R3</th><th>R4</th><th>Total</th>
        </tr></thead><tbody>`;

    tierData.forEach((rows, ti) => {
      rows.forEach((r, ri) => {
        const bg = r.isBest ? ' best-score' : '';
        const roundCols = r.rounds.map((rv, k) => {
          // A round is only "completed" if we have a realistic 18-hole stroke total
          const isCompleted = rv !== null && rv >= 65 && rv <= 85;
          const isCurrentRound = !r.cut && !r.finished && r.period === (k + 1) && r.active;
          const isFuture = !isCompleted && !isCurrentRound;
          // For active round, pass incremental topar (just this round), not cumulative
          const activeScore = isCurrentRound ? activeRoundTopar(r) : null;
          return roundCell(isCompleted ? rv : null, activeScore, r.thru, isCurrentRound, isFuture, r.isBest, r.teeTime);
        });
        html += `<tr class="${r.cut ? 'cut-row' : ''}${ri === 0 ? ' tier-start' : ''}">
          <td class="left"><span class="pn">${r.sn}</span><span class="tier-badge">${r.tier}</span></td>
          <td class="pos-cell">${r.pos || '-'}</td>
          ${roundCols.join('')}
          <td class="${bg}">${fmt(computeTotal(r))}</td>
        </tr>`;
      });
    });

    const sumCells = [0,1,2,3].map(ri => `<td>${roundTotals[ri] !== null ? fmt(roundTotals[ri]) : '-'}</td>`);
    html += `<tr class="summary-row tier-start">
      <td class="left" colspan="2">Pool total</td>
      ${sumCells.join('')}
      <td>${fmt(currentTotal)}</td>
    </tr></tbody></table></div></div>`;
  });
  document.getElementById('tab-scorecard').innerHTML = html;
}

// Players who appear in ESPN data but are not competing (ceremonial starters, etc.)
const NON_COMPETING = new Set([
  'fred couples', 'danny willett', 'jose maria olazabal', 'vijay singh',
  'angel cabrera', 'mike weir', 'gary player', 'jack nicklaus', 'tom watson',
  'fuzzy zoeller', 'ian woosnam', 'sandy lyle', 'larry mize',
]);

function renderLeaderboard() {
  if (!Object.keys(playerMap).length) return;
  const allPoolNames = new Set(TIERS.flatMap(t => t.players.map(p => norm(FULLNAMES[p] || p))));
  const sorted = Object.values(playerMap)
    .filter(p => !NON_COMPETING.has(norm(p.name)))
    .sort((a, b) => {
    if (a.cut && !b.cut) return 1;
    if (!a.cut && b.cut) return -1;
    return (computeTotal(a) ?? 99) - (computeTotal(b) ?? 99);
  });

  let html = `<p class="lb-note">Players in your pool are <span>highlighted</span>. Strikethrough = missed cut.</p>
  <div class="sc-wrap"><table>
    <thead><tr>
      <th>Pos</th><th class="left">Player</th>
      <th>R1</th><th>R2</th><th>R3</th><th>R4</th><th>Total</th>
    </tr></thead><tbody>`;

  sorted.slice(0, 70).forEach(p => {
    const inPool = allPoolNames.has(norm(p.name)) || [...allPoolNames].some(n => norm(p.name).includes(n.split(' ').pop()) && n.split(' ').pop().length > 3);
    const roundCols = (p.rounds || [null,null,null,null]).slice(0,4).map((rv, k) => {
      if (rv !== null && rv >= 65 && rv <= 85) return `<td>${fmt(rv - 72)}</td>`;
      const isActiveRound = !p.cut && !p.finished && p.period === (k+1) && p.active;
      if (isActiveRound && p.topar !== null && p.topar !== undefined) {
        const tv = (p.thru && p.thru !== '-' && p.thru !== 'F') ? p.thru : '';
        const lbThruHtml = tv
          ? `<span class="rthru live"><span class="live-dot"></span>${tv}</span>`
          : (p.teeTime ? `<span class="rthru">${p.teeTime}</span>` : `<span class="rthru live"><span class="live-dot"></span>Live</span>`);
        const incremental = activeRoundTopar(p);
        return `<td><div class="rcell"><span class="rscore">${fmt(incremental)}</span>${lbThruHtml}</div></td>`;
      }
      return `<td style="color:var(--text-tertiary)">-</td>`;
    });
    html += `<tr class="${p.cut ? 'cut-row' : ''}${inPool ? ' inpool' : ''}">
      <td class="pos-cell">${p.pos || '-'}</td>
      <td class="left"><span class="pn">${p.name}</span></td>
      ${roundCols.join('')}
      <td>${fmt(computeTotal(p))}</td>
    </tr>`;
  });

  html += '</tbody></table></div>';
  document.getElementById('tab-leaderboard').innerHTML = html;
}

  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + id).classList.add('active');
}
